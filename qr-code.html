<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ברטה - QR Code</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #F4EBD2;
    }

    .qr-card {
      background: #FFFFFF;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      padding: 48px 40px 52px;
      text-align: center;
      max-width: 340px;
      width: 100%;
    }

    .shop-name {
      font-size: 2.42rem;
      font-weight: 700;
      color: rgb(63, 92, 56);
      margin-bottom: 6px;
    }

    .shop-subtitle {
      font-size: 0.85rem;
      font-weight: 500;
      color: rgb(63, 92, 56);
      letter-spacing: 0.12em;
      opacity: 0.7;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: rgba(63, 92, 56, 0.2);
      margin: 28px auto;
    }

    .qr-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: rgb(63, 92, 56);
      margin-bottom: 6px;
    }

    .qr-subtitle {
      font-size: 0.85rem;
      font-weight: 500;
      color: rgb(63, 92, 56);
      opacity: 0.65;
      margin-bottom: 28px;
    }

    #qr-container {
      display: flex;
      justify-content: center;
    }

    #qr-container canvas,
    #qr-container img {
      border-radius: 10px;
    }

    @media print {
      body {
        background: #FFFFFF;
        min-height: auto;
      }

      .qr-card {
        box-shadow: none;
        border: 2px solid rgb(63, 92, 56);
        max-width: none;
        width: 10cm;
        padding: 1.5cm 1.2cm;
        border-radius: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="qr-card">
    <h1 class="shop-name">ברטה</h1>
    <p class="shop-subtitle">Berta</p>

    <div class="divider"></div>

    <p class="qr-title">כרטיס ניקוב דיגיטלי</p>
    <p class="qr-subtitle">קפה עשירי חינם :)</p>

    <div id="qr-container"></div>
  </div>

  <script>
    new QRCode(document.getElementById("qr-container"), {
      text: "https://danielhadar.github.io/nikuv/",
      width: 220,
      height: 220,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>

</body>
</html>
