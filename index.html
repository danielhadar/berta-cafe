<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3F5C38">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ברטה">
  <link rel="manifest" href="manifest.json?v=4">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=4">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=4">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=4">
  <script src="app.js?v=4" defer></script>
  <title>ברטה - כרטיס ניקוב</title>
</head>
<body>

  <!-- localStorage unavailable error (hidden by default) -->
  <div id="storage-error" class="storage-error hidden">
    <p class="storage-error-he">הדפדפן לא תומך בשמירת נתונים. נסו לפתוח בדפדפן רגיל.</p>
    <p class="storage-error-en">Your browser doesn't support data storage. Please use a regular browser.</p>
  </div>

  <!-- Main app container -->
  <div id="app" class="app-container">

    <!-- Header / Logo -->
    <header class="header">
      <img src="logo.png?v=4" alt="ברטה - Berta" class="header-logo">
    </header>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden" aria-live="polite"></div>

    <!-- Tabs -->
    <nav class="tabs" role="tablist" aria-label="בחירת כרטיס">
      <button type="button" id="tab-coffee-btn" class="tab tab--active" role="tab" aria-selected="true" aria-controls="tab-coffee">כרטיסיית קפה</button>
      <button type="button" id="tab-gift-btn" class="tab" role="tab" aria-selected="false" aria-controls="tab-gift">כרטיס מתנה</button>
    </nav>

    <!-- Tab: Coffee Punch Card -->
    <div id="tab-coffee" class="tab-panel" role="tabpanel" aria-labelledby="tab-coffee-btn">
      <section class="card">
        <div class="card-grid" dir="ltr">
          <svg class="card-svg" viewBox="0 0 300 130" xmlns="http://www.w3.org/2000/svg" aria-label="כרטיס ניקוב">
            <!-- Slots generated dynamically by app.js -->
          </svg>
        </div>
        <p class="card-progress" dir="ltr"><span id="progress-count">0</span> / 10</p>
      </section>

      <section class="quantity-section">
        <p class="quantity-label">כמה ניקובים?</p>
        <div class="stepper" dir="ltr">
          <button type="button" id="stepper-minus" class="stepper-btn stepper-minus" aria-label="הפחת ניקוב" disabled>-</button>
          <span id="stepper-value" class="stepper-value" aria-live="polite">1</span>
          <button type="button" id="stepper-plus" class="stepper-btn stepper-plus" aria-label="הוסף ניקוב">+</button>
        </div>
      </section>

      <section class="code-section">
        <input
          type="text"
          id="code-input"
          class="code-input"
          dir="ltr"
          inputmode="numeric"
          placeholder="הזינו קוד"
          aria-label="הזינו קוד"
          autocomplete="off"
        >
        <button type="button" id="punch-btn" class="punch-btn" disabled>קדימה</button>
        <div id="status-message" class="status-message hidden" role="status" aria-live="polite"></div>
      </section>
    </div>

    <!-- Tab: Gift Card -->
    <div id="tab-gift" class="tab-panel hidden" role="tabpanel" aria-labelledby="tab-gift-btn">

      <!-- Unloaded state: enter a gift code -->
      <section id="gift-unloaded" class="gift-unloaded">
        <p class="gift-prompt">הזינו קוד מתנה</p>
        <input
          type="text"
          id="gift-code-input"
          class="gift-code-input"
          dir="ltr"
          inputmode="numeric"
          placeholder="קוד מתנה"
          aria-label="קוד מתנה"
          autocomplete="off"
        >
        <button type="button" id="gift-check-btn" class="gift-check-btn" disabled>בדיקה</button>
        <div id="gift-status" class="status-message hidden" role="status" aria-live="polite"></div>
      </section>

      <!-- Loaded state: balance + redeem -->
      <section id="gift-loaded" class="gift-loaded hidden">
        <div class="gift-card">
          <p class="gift-balance-label">יתרה</p>
          <p class="gift-balance-amount" dir="ltr"><span id="gift-balance">180</span> ₪</p>
          <p class="gift-redeem-label">כמה להשתמש? (₪)</p>
          <input
            type="number"
            id="gift-amount-input"
            class="gift-amount-input"
            dir="ltr"
            inputmode="numeric"
            min="1"
            step="1"
            placeholder="סכום"
            aria-label="סכום למימוש"
            autocomplete="off"
          >
          <button type="button" id="gift-redeem-btn" class="gift-redeem-btn" disabled>מימוש</button>
          <div id="gift-redeem-status" class="status-message hidden" role="status" aria-live="polite"></div>
        </div>
      </section>
    </div>

    <!-- Social hub -->
    <hr class="social-separator" aria-hidden="true">
    <nav class="social-hub" aria-label="קישורים חיצוניים" dir="ltr">
      <a class="social-link social-link--facebook"
         href="https://www.facebook.com/p/%D7%91%D7%A8%D7%98%D7%94-%D7%A7%D7%A4%D7%94-%D7%98%D7%91%D7%A2%D7%95%D7%9F-61559582715226/"
         target="_blank" rel="noopener" aria-label="Facebook">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
        </svg>
      </a>
      <a class="social-link social-link--instagram"
         href="https://www.instagram.com/bertacoffetivon/"
         target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.6" fill="currentColor" stroke="none"/>
        </svg>
      </a>
      <a class="social-link social-link--maps"
         href="https://maps.app.goo.gl/YEcjKC9eT5NTqfX26"
         target="_blank" rel="noopener" aria-label="Google Maps">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/>
        </svg>
      </a>
      <a class="social-link social-link--phone"
         href="tel:0553181113" aria-label="התקשרו">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/>
        </svg>
      </a>
    </nav>

    <!-- Footer spacer -->
    <footer class="footer"></footer>

  </div>

  <!-- Celebration overlay (hidden by default) -->
  <div id="celebration" class="celebration-overlay" role="dialog" aria-modal="true" aria-labelledby="celebration-title">
    <div class="confetti-container">
      <div class="confetti confetti-diamond"></div>
      <div class="confetti confetti-circle"></div>
      <div class="confetti confetti-hexagon"></div>
      <div class="confetti confetti-triangle"></div>
      <div class="confetti confetti-square"></div>
      <div class="confetti confetti-diamond"></div>
      <div class="confetti confetti-circle"></div>
      <div class="confetti confetti-hexagon"></div>
      <div class="confetti confetti-triangle"></div>
      <div class="confetti confetti-square"></div>
      <div class="confetti confetti-diamond"></div>
      <div class="confetti confetti-circle"></div>
      <div class="confetti confetti-hexagon"></div>
      <div class="confetti confetti-triangle"></div>
      <div class="confetti confetti-square"></div>
      <div class="confetti confetti-diamond"></div>
      <div class="confetti confetti-circle"></div>
      <div class="confetti confetti-hexagon"></div>
      <div class="confetti confetti-triangle"></div>
      <div class="confetti confetti-square"></div>
      <div class="confetti confetti-diamond"></div>
      <div class="confetti confetti-circle"></div>
      <div class="confetti confetti-hexagon"></div>
      <div class="confetti confetti-triangle"></div>
      <div class="confetti confetti-square"></div>
      <div class="confetti confetti-diamond"></div>
      <div class="confetti confetti-circle"></div>
      <div class="confetti confetti-hexagon"></div>
      <div class="confetti confetti-triangle"></div>
      <div class="confetti confetti-square"></div>
    </div>
    <div class="celebration-content">
      <h2 id="celebration-title" class="celebration-line1">הקפה הזה על חשבוננו :)</h2>
      <button type="button" id="celebration-close" class="celebration-close-btn">כרטיסיה חדשה</button>
    </div>
  </div>

</body>
</html>
